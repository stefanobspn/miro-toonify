<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miro Sticky Notes Exporter</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="script.js"></script>
  <script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
</head>

<body>
  <h1>Miro Sticky Notes Exporter</h1>
  <p>Select all sticky notes to be exported</p>
  <button id="btn-export">Export</button>

  <label id="lbl-result">Export Result</label>
  <textarea id="txt-result" readonly placeholder="The export result will show here..."></textarea>
</body>

</html>
